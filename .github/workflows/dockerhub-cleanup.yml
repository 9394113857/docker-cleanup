name: 🚨 DockerHub Full Cleanup

on:
  workflow_dispatch:
    inputs:
      confirm_delete:
        description: "Type YES to delete ALL DockerHub repos"
        required: false
        default: "NO"

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Check Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_delete }}" != "YES" ]; then
            echo "❌ Skipping deletion (confirmation not provided)"
            exit 0
          fi

      - name: 📦 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 🔑 Authenticate to DockerHub
        run: |
          TOKEN=$(curl -s -X POST https://hub.docker.com/v2/users/login/ \
            -H "Content-Type: application/json" \
            -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' | jq -r .token)
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: 📋 Fetch All Repositories
        run: |
          curl -s -H "Authorization: JWT $TOKEN" \
          "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/?page_size=100" > repos.json

      - name: 🗑️ Delete All Repositories
        run: |
          for repo in $(cat repos.json | jq -r '.results[].name'); do
            echo "Deleting $repo"
            curl -s -X DELETE \
              -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/$repo/"
          done

      - name: ✅ Completed
        run: echo "All DockerHub repositories deleted successfully 🚀"
